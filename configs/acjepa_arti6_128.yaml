# Articulator-Conditioned JEPA @128px/32f -- usc_lss MRI frames + arti-6, frozen T-SSL
# encoder. SMOKE / ablation config (fits a single small GPU, e.g. P100-16GB).
# Driven by scripts/12_train_acjepa.sh -> artijepa.acjepa_train.
#
# Data: each item is a 32-frame chunk of a usc_lss session (.mat), read from the
# arti_cache .npy. target_fps=100 == native rate -> NO temporal interpolation and NO
# consonant aliasing (plan §1.1). frames_per_clip 32 @100fps = 0.32 s, T'=16 tokens.
meta:
  folder: /scratch1/hongn/artijepa/runs/acjepa_arti6_128
  seed: 0
  dtype: float16            # P100 -> fp16 + GradScaler
  eval_freq: 1
  save_freq: 1
  probe_max_batches: 8      # val batches for the arti real-vs-shuffled diagnostic
  max_steps: null
  resume: null
  snapshot_freq: null

data:
  manifest: /scratch1/hongn/artijepa/arti_manifest.csv     # built by arti_cache.py
  spatial_size: 128
  spatial_mode: resize
  frames_per_clip: 32
  target_fps: 100.0         # native rate (sessions are 100 Hz) -> frame-exact, no alias
  sampling: tile            # REQUIRED by RTMRIArtiDataset (one (session,chunk) per item)
  tubelet_size: 2
  patch_size: 16
  intensity_norm: zscore
  augment: true
  batch_size: 8
  num_workers: 2
  pin_mem: false
  persistent_workers: false

arti:                       # arti-6 cache (arti_cache.py); A=6 (vs the 768-D audio one)
  dim: 6
  cache_dir: /scratch1/hongn/artijepa/arti_feats/usc_lss   # holds meta.json + *.arti/image.npy
  normalize: zscore         # per-dim z-score with corpus stats from meta.json

objective: temporal
ctx_frames: 8               # context-prefix AR rollout: seed 8 real frames, predict the
                            # rest from arti only -> makes the articulators necessary (plan §4)
predictor:
  kind: ac_arti             # state=arti[t], action=arti[t+1]-arti[t]; AC predictor verbatim
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  use_rope: true
  frame_causal: true

model:
  model_name: vit_large
  checkpoint: /scratch1/hongn/artijepa/runs/tssl_vitl_256/latest.pt   # T-SSL ViT-L (RoPE -> res-flexible)
  checkpoint_key: target_encoder
  use_activation_checkpointing: false

loss:
  loss_exp: 1.0

optimization:
  epochs: 30
  ipe: 500
  effective_batch: 128
  auto_steps: 2             # used only when ctx_frames is null
  lr: 5.0e-4
  start_lr: 1.0e-4
  final_lr: 1.0e-5
  warmup: 3
  weight_decay: 0.04
  final_weight_decay: 0.04
  ipe_scale: 1.0
  betas: [0.9, 0.999]
  eps: 1.0e-8
