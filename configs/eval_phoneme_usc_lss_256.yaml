# Phoneme eval, Task 2 gold OOD, at 256px (matched to the 256px T-SSL run).
# Per-token features are [T'=16, D=1024] regardless of spatial res (spatial tokens
# are pooled), so the feature cache is the same size as 128px — only the encoder
# forward is heavier. Run pretrained (baseline) then tssl_256 for the Δκ/ΔPER.
meta:
  out: /data2/hongn/artijepa/eval
  cache_dir: /data2/hongn/artijepa/feat_cache/phoneme
  seed: 0
  dtype: bfloat16
  tag: null

data:
  kind: usc_lss
  manifest: /data1/span_data/usc_lss/phoneme_manifest.csv
  grayscale_stats: /data2/hongn/artijepa/grayscale_stats.json
  spatial_size: 256
  spatial_mode: resize
  frames_per_clip: 32
  target_fps: 50.0        # match the 50 fps 256px T-SSL encoder; 32f = 0.64 s, tubelet 2 -> 16 tokens @ 25 Hz (40 ms)
  tubelet_size: 2
  patch_size: 16
  intensity_norm: zscore
  batch_size: 8            # 256px extraction batch
  num_workers: 4

encoder:
  spec: pretrained
  model_name: vit_large
  checkpoint: null
  key: auto

probe:
  type: tcn
  epochs: 40
  warmup: 4
  lr: 1.0e-3
  wd: 0.01
  hidden: 512
  batch_size: 32
