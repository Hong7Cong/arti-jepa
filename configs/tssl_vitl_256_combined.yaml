# T-SSL: domain-adaptive V-JEPA pre-training, ViT-L @ 256px / 32f.
# COMBINED pre-training pool = rtMRI-75 (manifest_alltrain) + longitudinal corpus.
# Distinct run name from the 75-only run (runs/tssl_vitl_256) so its checkpoints
# are preserved -> this is the WITH-longitudinal arm of the ablation.
meta:
  folder: /data2/hongn/artijepa/runs/tssl_vitl_256_combined
  seed: 0
  dtype: float16          # V100 (Volta) has no bf16 tensor cores -> fp16 + GradScaler
  eval_freq: 1            # run label-free collapse diagnostics every N epochs
  save_freq: 1            # checkpoint every epoch (= every ipe=500 micro-steps) -> resumable
  probe_max_batches: 20   # held-out clips for collapse metrics
  max_steps: null         # bound wall-clock per allocation if needed (CLI --max-steps)
  resume: null            # set to runs/tssl_vitl_256_combined/latest.pt to CONTINUE
  snapshot_freq: 50       # also keep ckpt_NN.pt every N epochs (history). Takes effect
                          # on the next resume; the in-flight run is covered by
                          # runs/.../snapshot_every60.sh (same ckpt_NN.pt naming).
                          # Set 60->50 (2026-07-01): resuming from ep77, the next multiples
                          # of 50 are 100/150/200 (50 already passed, 250 > 215 epochs) ->
                          # yields exactly the requested ckpt_100/150/200.pt.

data:
  # rtMRI-75 all-train + longitudinal (21 disjoint speakers), every row split=train.
  # 9,353 train videos -> 343,517 tile chunks @ 256/50fps. Build with
  # scripts/01b_prepare_longitudinal.sh. WITHOUT-longitudinal baseline =
  # configs/tssl_vitl_256.yaml (manifest_alltrain.csv, runs/tssl_vitl_256).
  manifest: /data2/hongn/artijepa/manifest_combined.csv
  grayscale_stats: /data2/hongn/artijepa/grayscale_stats_combined.json
  spatial_size: 256
  spatial_mode: resize
  frames_per_clip: 32
  target_fps: 50.0        # 0.64 s / 32-frame chunk
  sampling: tile          # resample whole video @50fps, split into 32f chunks
  tubelet_size: 2
  patch_size: 16
  intensity_norm: zscore
  augment: true
  batch_size: 32          # micro-batch. V100-32GB: act-ckpt MANDATORY at 256px.
                          # Raised 16->32 on resume (2026-06-27) after the SLURM job got
                          # 64 GB host RAM + 32 cores -> push GPU utilization. bs32 peaks
                          # ~24.5 GB on the 32 GB V100 (~7 GB headroom); the original bs32
                          # OOM (combined run, epoch 1) was fragmentation, now mitigated by
                          # PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True (launcher
                          # default). accum = eff/bs = 4 (eff_batch 128 unchanged); ipe is
                          # lowered 1000->500 below so oue stays 125/epoch and the 215-epoch
                          # LR/EMA schedule is byte-for-byte identical -> resumes cleanly
                          # from the bs16 latest.pt. If bs32 OOMs, revert to bs16/ipe1000.
                          # bs64 OOMs.
  probe_batch_size: 16    # batch for the held-out collapse-monitor loader (raised 8->16)
  num_workers: 12         # 32 cores / 64 GB host RAM -> saturate the data pipeline (was 2
                          # under the old 16 GB cap). persistent main loader = 12 workers.
  pin_mem: true           # 64 GB host RAM -> pin for faster H2D (was false under 16 GB cap)

model:
  model_name: vit_large
  pretrained: true        # T-SSL = domain-adaptive continuation from V-JEPA2 ViT-L
  checkpoint: null        # auto-resolve vitl.pt under /data2/hongn/artijepa/checkpoints
  checkpoint_key: target_encoder
  use_activation_checkpointing: true

mask: null                # null -> masking.mask_config_for(grid) (re-tuned per grid)

loss:
  loss_exp: 1.0           # L1 feature loss

optimization:
  # 215 epochs x ipe 1000 x bs 16 = 3.44M chunk-samples = ~10 passes over the 343k
  # pool (~99.995% of chunks seen). Schedule horizon is oue*epochs = 125*215 =
  # 26,875 optimizer-updates; cosine LR is stretched over the full run. (ipe/bs were
  # rescaled 500/32 -> 1000/16 for OOM headroom; oue=125/epoch and the horizon are
  # unchanged, so this is the SAME optimization, just a smaller micro-batch.)
  epochs: 215
  ipe: 500                # micro-batches/epoch (fixed); /accum 4 -> 125 oue/epoch
  effective_batch: 128    # grad-accum: accum_steps = effective_batch / batch_size = 8
  lr: 5.0e-4              # cosine
  start_lr: 1.0e-4
  final_lr: 1.0e-5
  warmup: 5               # epochs (= 625 optimizer-updates, ~2.3% of the run)
  weight_decay: 0.04
  final_weight_decay: 0.04
  ema: [0.998, 1.0]       # target-encoder momentum schedule (small-data tuned)
  ipe_scale: 1.0
  betas: [0.9, 0.999]
  eps: 1.0e-8
