# Articulator-Conditioned JEPA @256px/32f -- V100-32GB single-GPU, HARD-CONDITIONING (plan §8 fix A).
# Identical to acjepa_arti6_256_v100.yaml EXCEPT ctx_frames: 2 (was 8) + separate run folder.
# With ctx_frames=2 the AR branch seeds only 2 real frames (~40 ms) and predicts the remaining
# 14 of T'=16 tokens (~280 ms) from arti-6 alone -> over that long arti-only horizon, frame
# extrapolation decays and the articulators become the dominant signal. Goal: push `arti_gap`
# (diagnostics.jsonl) well above the ~5e-4 plateau the ctx_frames=8 run hit.
# COST: 1 TF + 14 AR = 15 backbone calls/step (was 9) -> ~1.6x slower than ctx=8.
#   bash scripts/12_train_acjepa.sh <abs path>/configs/acjepa_arti6_256_v100_ctx2.yaml
meta:
  folder: /scratch1/hongn/artijepa/runs/acjepa_arti6_256_v100_ctx2
  seed: 0
  dtype: float16
  eval_freq: 1
  save_freq: 1
  probe_max_batches: 8
  max_steps: null
  resume: null
  snapshot_freq: null

data:
  manifest: /scratch1/hongn/artijepa/arti_manifest.csv
  spatial_size: 256
  spatial_mode: resize
  frames_per_clip: 32
  target_fps: 100.0
  sampling: tile
  tubelet_size: 2
  patch_size: 16
  intensity_norm: zscore
  augment: true
  batch_size: 3             # ctx=2 bench: ckpt-off bs3=22.7GB (safe); bs4=29GB too close to 32GB ceiling
  num_workers: 4            # was 8: SLURM --mem=64G cgroup OOM'd @ep10 (8 workers x page-cache)
  pin_mem: false            # was true: pinned/shmem buffers (~4.5GB, non-reclaimable) caused the OOM; compute-bound so no speed loss
  persistent_workers: false # was true: respawn per epoch to release worker page-cache under the 64G cap

arti:
  dim: 6
  cache_dir: /scratch1/hongn/artijepa/arti_feats/usc_lss
  normalize: zscore

objective: temporal
ctx_frames: 2             # <-- THE CHANGE (was 8): seed 2 real frames, predict 14 from arti only
predictor:
  kind: ac_arti
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  use_rope: true
  frame_causal: true

model:
  model_name: vit_large
  checkpoint: /scratch1/hongn/artijepa/runs/tssl_vitl_256/latest.pt
  checkpoint_key: target_encoder
  use_activation_checkpointing: false   # OFF = fastest (bs3 ckpt-off 22.7GB fits with margin)

loss:
  loss_exp: 1.0

optimization:
  epochs: 20
  ipe: 1000
  effective_batch: 128
  auto_steps: 2             # ignored while ctx_frames is set (context-prefix path)
  lr: 5.0e-4
  start_lr: 1.0e-4
  final_lr: 1.0e-5
  warmup: 2
  weight_decay: 0.04
  final_weight_decay: 0.04
  ipe_scale: 1.0
  betas: [0.9, 0.999]
  eps: 1.0e-8
