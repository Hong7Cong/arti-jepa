# Articulator-Conditioned JEPA, MULTI-GPU (DDP) @256px/32f -- usc_lss frames + arti-6,
# frozen T-SSL encoder. Driven by scripts/13_train_acjepa_ddp.sh -> acjepa_train_ddp
# via torchrun. DDP is DATA-parallel: the frozen encoder is replicated per rank; only
# the AC predictor is DDP-wrapped (static_graph=True REQUIRED -- see acjepa_train_ddp).
#
# Mirrors the V100 batch-4 trajectory across 2 GPUs: batch 2/gpu * world 2 = global
# micro-batch 4, accum = effective_batch/(batch*world) = 128/(2*2) = 32. On 2x P100-16GB
# keep activation checkpointing ON (256px graph + 8-step AR rollout) to fit 16 GB.
meta:
  folder: /scratch1/hongn/artijepa/runs/acjepa_arti6_256_ddp
  seed: 0
  dtype: float16
  eval_freq: 1
  save_freq: 1
  probe_max_batches: 8
  max_steps: null
  resume: null
  snapshot_freq: null

data:
  manifest: /scratch1/hongn/artijepa/arti_manifest.csv
  spatial_size: 256
  spatial_mode: resize
  frames_per_clip: 32
  target_fps: 100.0
  sampling: tile
  tubelet_size: 2
  patch_size: 16
  intensity_norm: zscore
  augment: true
  batch_size: 2             # PER-GPU. 2*world(2)=4 global == V100 batch.
  num_workers: 2            # PER-RANK
  pin_mem: false
  persistent_workers: false

arti:
  dim: 6
  cache_dir: /scratch1/hongn/artijepa/arti_feats/usc_lss
  normalize: zscore

objective: temporal
ctx_frames: 8
predictor:
  kind: ac_arti
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  use_rope: true
  frame_causal: true

model:
  model_name: vit_large
  checkpoint: /scratch1/hongn/artijepa/runs/tssl_vitl_256/latest.pt
  checkpoint_key: target_encoder
  use_activation_checkpointing: true    # ON for 16 GB P100s (safe ~3.5 GB); OFF on 32 GB

loss:
  loss_exp: 1.0

optimization:
  epochs: 20
  ipe: 1000                 # micro-steps/rank/epoch; accum=128/(2*2)=32 -> oue=31
  effective_batch: 128      # GLOBAL optimizer batch (batch * world * accum)
  auto_steps: 2
  lr: 5.0e-4
  start_lr: 1.0e-4
  final_lr: 1.0e-5
  warmup: 2
  weight_decay: 0.04
  final_weight_decay: 0.04
  ipe_scale: 1.0
  betas: [0.9, 0.999]
  eps: 1.0e-8
