# Articulator-Conditioned JEPA @256px/32f -- usc_lss MRI frames + arti-6, frozen T-SSL
# encoder. PRIMARY single-GPU config (needs a 32 GB GPU, e.g. V100-32GB; on 16 GB use
# the 128px config or the DDP one with activation checkpointing).
# Driven by scripts/12_train_acjepa.sh -> artijepa.acjepa_train.
meta:
  folder: /scratch1/hongn/artijepa/runs/acjepa_arti6_256
  seed: 0
  dtype: float16
  eval_freq: 1
  save_freq: 1
  probe_max_batches: 8
  max_steps: null
  resume: null
  snapshot_freq: null

data:
  manifest: /scratch1/hongn/artijepa/arti_manifest.csv
  spatial_size: 256
  spatial_mode: resize
  frames_per_clip: 32
  target_fps: 100.0         # native rate -> frame-exact, no consonant aliasing (plan §1.1)
  sampling: tile
  tubelet_size: 2
  patch_size: 16
  intensity_norm: zscore
  augment: true
  batch_size: 4             # ~25 GB at 256px, act-ckpt off (the 8-step AR graph is large)
  num_workers: 2
  pin_mem: false
  persistent_workers: false

arti:
  dim: 6
  cache_dir: /scratch1/hongn/artijepa/arti_feats/usc_lss
  normalize: zscore

objective: temporal
ctx_frames: 8
predictor:
  kind: ac_arti
  pred_depth: 12
  pred_embed_dim: 384
  pred_num_heads: 12
  use_rope: true
  frame_causal: true

model:
  model_name: vit_large
  checkpoint: /scratch1/hongn/artijepa/runs/tssl_vitl_256/latest.pt   # T-SSL ViT-L @256 (ep50, κ 0.530)
  checkpoint_key: target_encoder
  use_activation_checkpointing: false   # set true if OOM (trades ~30% recompute for VRAM)

loss:
  loss_exp: 1.0

optimization:
  epochs: 20
  ipe: 1000
  effective_batch: 128
  auto_steps: 2
  lr: 5.0e-4
  start_lr: 1.0e-4
  final_lr: 1.0e-5
  warmup: 2
  weight_decay: 0.04
  final_weight_decay: 0.04
  ipe_scale: 1.0
  betas: [0.9, 0.999]
  eps: 1.0e-8
